# 开发
spring:
  profiles: default
  application:
    name: mall-cart
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      username: nacos
      password: nacos
      config:
        server-addr: 127.0.0.1:8848
        namespace: public
        # 用于共享的配置文件
        shared-configs:
          - data-id: mall-mysql.yaml
            group: DEFAULT_GROUP

          - data-id: mall-redis.yaml
            group: DEFAULT_GROUP

        # 常规配置文件
        # 优先级大于 shared-configs，在 shared-configs 之后加载
        extension-configs:
          - data-id: mall-cart.yaml
            group: DEFAULT_GROUP
            refresh: true
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public


# 生产
